<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssetFlow - Enterprise Asset Management</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ----- Reset & Base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f6f9fc;
            color: #1e293b;
            line-height: 1.5;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            border: none;
            background: none;
        }
        input,
        select,
        textarea {
            font-family: inherit;
            font-size: 0.9rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* ----- Colors ----- */
        :root {
            --primary: #2a4b7c;
            --primary-light: #e8edf5;
            --primary-dark: #1a3354;
            --accent: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.03);
            --radius: 10px;
        }

        /* ----- Layout ----- */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* ----- Sidebar ----- */
        .sidebar {
            width: 250px;
            background: #fff;
            border-right: 1px solid var(--gray-200);
            padding: 1.5rem 0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-brand {
            padding: 0 1.5rem 1.5rem;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--gray-200);
        }
        .sidebar-brand i {
            font-size: 1.6rem;
            color: var(--accent);
        }
        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
        }
        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1.5rem;
            margin: 0.1rem 0.5rem;
            border-radius: 8px;
            color: var(--gray-600);
            font-weight: 500;
            transition: all 0.15s;
            font-size: 0.9rem;
        }
        .sidebar-nav .nav-item:hover {
            background: var(--gray-100);
            color: var(--gray-800);
        }
        .sidebar-nav .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
        }
        .sidebar-nav .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }
        .sidebar-footer {
            border-top: 1px solid var(--gray-200);
            padding: 1rem 1.5rem;
            font-size: 0.85rem;
            color: var(--gray-500);
        }
        .sidebar-footer .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .sidebar-footer .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* ----- Main ----- */
        .main {
            flex: 1;
            min-height: 100vh;
            background: var(--gray-50);
        }
        .topbar {
            background: #fff;
            padding: 0.75rem 2rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .topbar-left h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gray-800);
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }
        .topbar-right .notification-bell {
            position: relative;
            font-size: 1.2rem;
            color: var(--gray-600);
            cursor: pointer;
        }
        .topbar-right .notification-bell .badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: var(--danger);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.15rem 0.45rem;
            border-radius: 20px;
        }
        .topbar-right .role-tag {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .page-content {
            padding: 2rem;
        }

        /* ----- Cards & Grid ----- */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .kpi-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 1rem 1.2rem;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--accent);
        }
        .kpi-card .kpi-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--gray-500);
            font-weight: 600;
        }
        .kpi-card .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.2rem;
        }
        .kpi-card.danger {
            border-left-color: var(--danger);
        }
        .kpi-card.warning {
            border-left-color: var(--warning);
        }
        .kpi-card.success {
            border-left-color: var(--success);
        }

        .quick-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .quick-actions .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            background: #fff;
            border: 1px solid var(--gray-200);
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .quick-actions .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .quick-actions .btn-primary:hover {
            background: var(--primary-dark);
        }
        .quick-actions .btn-outline {
            border-color: var(--gray-300);
        }
        .quick-actions .btn-outline:hover {
            background: var(--gray-100);
        }

        .panel {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .panel-header h3 {
            font-size: 1.05rem;
            font-weight: 600;
        }
        .panel-header .subtitle {
            font-size: 0.85rem;
            color: var(--gray-500);
            font-weight: 400;
        }

        /* ----- Tables ----- */
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 0.6rem 0.8rem;
            background: var(--gray-50);
            font-weight: 600;
            color: var(--gray-600);
            border-bottom: 2px solid var(--gray-200);
        }
        td {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid var(--gray-100);
        }
        tr:hover td {
            background: var(--gray-50);
        }
        .status-badge {
            display: inline-block;
            padding: 0.15rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        .status-badge.available {
            background: #dcfce7;
            color: #15803d;
        }
        .status-badge.allocated {
            background: #dbeafe;
            color: #1d4ed8;
        }
        .status-badge.reserved {
            background: #fef3c7;
            color: #b45309;
        }
        .status-badge.maintenance {
            background: #fce4ec;
            color: #b91c1c;
        }
        .status-badge.lost {
            background: #f1f5f9;
            color: #475569;
        }
        .status-badge.retired,
        .status-badge.disposed {
            background: #e5e7eb;
            color: #4b5563;
        }
        .status-badge.approved {
            background: #dcfce7;
            color: #15803d;
        }
        .status-badge.pending {
            background: #fef3c7;
            color: #b45309;
        }
        .status-badge.rejected {
            background: #fce4ec;
            color: #b91c1c;
        }
        .status-badge.completed {
            background: #e0e7ff;
            color: #4338ca;
        }

        .badge-sm {
            font-size: 0.7rem;
            background: var(--gray-200);
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
            color: var(--gray-600);
        }

        /* ----- Forms ----- */
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
            color: var(--gray-700);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            background: #fff;
            transition: border 0.15s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-row.three {
            grid-template-columns: 1fr 1fr 1fr;
        }

        /* ----- Tabs ----- */
        .tabs {
            display: flex;
            gap: 0.25rem;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .tabs .tab {
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            color: var(--gray-500);
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .tabs .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tabs .tab:hover {
            color: var(--gray-700);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* ----- Modals ----- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
            animation: fadeIn 0.2s ease;
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            max-width: 580px;
            width: 100%;
            padding: 1.8rem 2rem;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 {
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .modal .modal-actions {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .modal .btn-secondary {
            background: var(--gray-200);
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            font-weight: 500;
        }
        .modal .btn-primary {
            background: var(--primary);
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            font-weight: 500;
        }
        .modal .btn-primary:hover {
            background: var(--primary-dark);
        }
        .modal .btn-danger {
            background: var(--danger);
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ----- Notifications toast ----- */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 2000;
            max-width: 380px;
        }
        .toast {
            background: #1e293b;
            color: #fff;
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.25s ease;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.9rem;
        }
        .toast.success {
            border-left: 4px solid var(--success);
        }
        .toast.error {
            border-left: 4px solid var(--danger);
        }
        .toast.warning {
            border-left: 4px solid var(--warning);
        }
        .toast i {
            font-size: 1.1rem;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ----- Misc ----- */
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .gap-1 {
            gap: 0.5rem;
        }
        .mt-2 {
            margin-top: 1.5rem;
        }
        .text-sm {
            font-size: 0.85rem;
        }
        .text-muted {
            color: var(--gray-500);
        }
        .fw-600 {
            font-weight: 600;
        }
        .inline-flex {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .clickable {
            cursor: pointer;
        }
        .w-full {
            width: 100%;
        }
        .text-center {
            text-align: center;
        }

        /* Scroll */
        .sidebar::-webkit-scrollbar,
        .modal::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-thumb,
        .modal::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 64px;
                padding: 0.5rem 0;
            }
            .sidebar-brand span,
            .sidebar-nav .nav-item span,
            .sidebar-footer .user-info span {
                display: none;
            }
            .sidebar-brand {
                justify-content: center;
                padding: 0.5rem;
                font-size: 1.2rem;
            }
            .sidebar-nav .nav-item {
                justify-content: center;
                padding: 0.6rem;
                margin: 0.2rem;
            }
            .sidebar-footer .user-info {
                justify-content: center;
            }
            .topbar {
                padding: 0.5rem 1rem;
            }
            .page-content {
                padding: 1rem;
            }
            .form-row,
            .form-row.three {
                grid-template-columns: 1fr;
            }
            .kpi-grid {
                grid-template-columns: 1fr 1fr;
            }
            .modal {
                padding: 1.2rem;
                margin: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script>
        // ------------------------------------------------
        //  SIMPLE STATE & DATA STORE (in-memory)
        // ------------------------------------------------
        const Store = {
            // --- Users ---
            users: [
                { id: 'u1', name: 'Admin User', email: 'admin@assetflow.com', password: 'admin123', role: 'admin',
                    departmentId: null, status: 'Active' },

            currentUser: null,

            // --- Departments ---
            departments: [
                { id: 'd1', name: 'Engineering', parentId: null, headId: 'u3', status: 'Active' },
                { id: 'd2', name: 'Marketing', parentId: null, headId: null, status: 'Active' },

            // --- Categories ---
            categories: [
                { id: 'c1', name: 'Electronics', customFields: ['warranty_period'] },
                { id: 'c2', name: 'Furniture', customFields: [] },
                { id: 'c3', name: 'Vehicles', customFields: ['license_plate'] },

            // --- Assets ---
            assets: [
                { id: 'a1', name: 'MacBook Pro 16"', categoryId: 'c1', assetTag: 'AF-0001', serialNo: 'SN12345',
                    acquisitionDate: '2025-01-15', acquisitionCost: 2499, condition: 'Good', location: 'Office A',
                    status: 'Available', isShared: false, departmentId: null, holderId: null, history: [] },
                { id: 'a2', name: 'Dell XPS 13', categoryId: 'c1', assetTag: 'AF-0002', serialNo: 'SN67890',
                    acquisitionDate: '2025-02-10', acquisitionCost: 1899, condition: 'Excellent', location: 'Office B',
                    status: 'Allocated', isShared: false, departmentId: 'd1', holderId: 'u4', history: [] },
                { id: 'a3', name: 'Conference Room B2', categoryId: 'c2', assetTag: 'AF-0003', serialNo: 'ROOM-B2',
                    acquisitionDate: '2024-11-01', acquisitionCost: 0, condition: 'Good', location: '2nd Floor',
                    status: 'Available', isShared: true, departmentId: null, holderId: null, history: [] },
                { id: 'a4', name: 'Toyota Camry', categoryId: 'c3', assetTag: 'AF-0004', serialNo: 'VEH-001',
                    acquisitionDate: '2024-08-20', acquisitionCost: 32000, condition: 'Good', location: 'Parking',
                    status: 'Reserved', isShared: true, departmentId: null, holderId: null, history: [] },
                { id: 'a5', name: 'HP LaserJet', categoryId: 'c1', assetTag: 'AF-0005', serialNo: 'PRN-987',
                    acquisitionDate: '2023-06-10', acquisitionCost: 450, condition: 'Fair', location: 'Office C',
                    status: 'Under Maintenance', isShared: false, departmentId: 'd2', holderId: 'u5', history: [] },
            ],

            // --- Bookings ---
            bookings: [
                { id: 'b1', assetId: 'a3', bookedBy: 'u4', start: '2026-07-13T09:00', end: '2026-07-13T10:00',

                { id: 'b2', assetId: 'a3', bookedBy: 'u5', start: '2026-07-13T14:00', end: '2026-07-13T15:30',
                    status: 'Upcoming', createdAt: '2026-07-11T08:30' },

            // --- Maintenance ---
            maintenance: [
                { id: 'm1', assetId: 'a5', requesterId: 'u5', issue: 'Paper jam frequently', priority: 'High',

            // --- Audits ---
            audits: [
                { id: 'aud1', name: 'Q3 Engineering Audit', scope: 'd1', dateRange: ['2026-07-01', '2026-07-15'],
                    auditors: ['u2'], status: 'In Progress', items: [] },
            ],

            // --- Notifications ---
            notifications: [
                { id: 'n1', userId: 'u4', message: 'Asset Dell XPS 13 allocated to you.', type: 'info',
                read: false, createdAt: '2026-07-10T11:00' },
                { id: 'n2', userId: 'u4', message: 'Maintenance request for HP LaserJet approved.',
                type: 'success', read: false, createdAt: '2026-07-11T10:30' },
                { id: 'n3', userId: 'u5', message: 'Overdue return: HP LaserJet expected 2026-07-09.',
                type: 'warning', read: false, createdAt: '2026-07-12T08:00' },
            ],

            // --- Logs ---
            logs: [],

            // --- Helpers ---
            nextId(prefix) {
                const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let id = prefix || '';
                for (let i = 0; i < 6; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
                return id;
            },

            getDepartment(id) { return this.departments.find(d => d.id === id); },
            getCategory(id) { return this.categories.find(c => c.id === id); },
            getUser(id) { return this.users.find(u => u.id === id); },
            getAsset(id) { return this.assets.find(a => a.id === id); },
            getBooking(id) { return this.bookings.find(b => b.id === id); },
            getMaintenance(id) { return this.maintenance.find(m => m.id === id); },

            getRoleLabel(role) {
                const map = { admin: 'Admin', asset_manager: 'Asset Manager', dept_head: 'Department Head',
                    employee: 'Employee' };
                return map[role] || role;
            },

            getStatusBadge(status) {
                const cls = {
                    'Available': 'available',
                    'Allocated': 'allocated',
                    'Reserved': 'reserved',
                    'Under Maintenance': 'maintenance',
                    'Lost': 'lost',
                    'Retired': 'retired',
                    'Disposed': 'disposed',
                };
                return cls[status] || 'available';
            },

            // Notification helpers
            addNotification(userId, message, type = 'info') {
                this.notifications.unshift({
                    id: this.nextId('n'),
                    userId,
                    message,
                    type,
                    read: false,
                    createdAt: new Date().toISOString()
                });
                // Render toast
                showToast(message, type);
            },

            addLog(userId, action) {
                const user = this.getUser(userId);
                this.logs.unshift({
                    id: this.nextId('l'),
                    userId,
                    userName: user ? user.name : 'System',
                    action,
                    timestamp: new Date().toISOString()
                });
            },

            // Find all assets held by a user
            getAssetsHeldBy(userId) {
                return this.assets.filter(a => a.holderId === userId && a.status === 'Allocated');
            },

            // Get department assets
            getDepartmentAssets(deptId) {
                return this.assets.filter(a => a.departmentId === deptId);
            },

            // Asset transitions
            transitionAsset(assetId, newStatus, note = '') {
                const asset = this.getAsset(assetId);
                if (!asset) return null;
                const oldStatus = asset.status;
                asset.status = newStatus;
                asset.history.push({
                    date: new Date().toISOString(),
                    from: oldStatus,
                    to: newStatus,
                    note
                });
                return asset;
            }
        };

        // ------------------------------------------------
        //  TOAST SYSTEM
        // ------------------------------------------------
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer') || (() => {
                const c = document.createElement('div');
                c.id = 'toastContainer';
                c.className = 'toast-container';
                document.body.appendChild(c);
                return c;
            })();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconMap = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-triangle-exclamation',
                info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fa-solid ${iconMap[type] || 'fa-info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3500);
        }

        function getModalTitle(type) {
            const map = {
                registerAsset: 'Register Asset',
                allocateAsset: 'Allocate Asset',
                returnAsset: 'Return Asset',
                transferAsset: 'Transfer Asset',
                bookResource: 'Book Resource',

        window.closeModal = function() {
            modalContent = null;
            render();

        // ----- ACTION HANDLERS -----
        window.registerAsset = function() {
            const name = document.getElementById('assetName')?.value.trim();
            const categoryId = document.getElementById('assetCategory')?.value;
            const serial = document.getElementById('assetSerial')?.value.trim();
            const date = document.getElementById('assetDate')?.value;
            const cost = parseFloat(document.getElementById('assetCost')?.value) || 0;
            const location = document.getElementById('assetLocation')?.value.trim();
            const condition = document.getElementById('assetCondition')?.value;
            const shared = document.getElementById('assetShared')?.checked || false;
            const deptId = document.getElementById('assetDept')?.value || null;

            if (!name) { showToast('Asset name is required', 'error'); return; }
            const tag = `AF-${String(Store.assets.length + 1).padStart(4, '0')}`;
            const asset = {
                id: Store.nextId('a'),
                name,
                categoryId,
                assetTag: tag,
                serialNo: serial || '',
                acquisitionDate: date || new Date().toISOString().slice(0, 10),
                acquisitionCost: cost,
                condition: condition || 'Good',
                location: location || '',
                status: 'Available',
                isShared: shared,
                departmentId: deptId,
                holderId: null,
                expectedReturnDate: null,
                history: []
            };
            Store.assets.push(asset);
            Store.addLog(Store.currentUser.id, `Registered asset ${name} (${tag})`);
            Store.addNotification(Store.currentUser.id, `Asset ${name} registered successfully.`, 'success');
            closeModal();
            showToast(`Asset ${tag} registered`, 'success');
            render();
        };

        window.allocateAsset = function(assetId) {
            const userId = document.getElementById('allocUser')?.value;
            const returnDate = document.getElementById('allocReturn')?.value;
            if (!userId) { showToast('Select an employee', 'error'); return; }
            const asset = Store.getAsset(assetId);
            if (!asset) { showToast('Asset not found', 'error'); return; }
            if (asset.status !== 'Available') { showToast('Asset is not available', 'error'); return; }
            asset.holderId = userId;
            asset.departmentId = Store.getUser(userId)?.departmentId || null;
            asset.expectedReturnDate = returnDate || null;
            asset.status = 'Allocated';
            asset.history.push({ date: new Date().toISOString(), from: 'Available', to: 'Allocated',
            note: `Allocated to ${Store.getUser(userId)?.name}` });
            Store.addLog(Store.currentUser.id, `Allocated ${asset.name} to ${Store.getUser(userId)?.name}`);
            Store.addNotification(userId, `Asset ${asset.name} allocated to you. Expected return: ${returnDate || 'Not set'}`,
                'info');
            closeModal();
            showToast(`Allocated ${asset.name}`, 'success');
            render();
        };

        window.returnAsset = function(assetId) {
            const notes = document.getElementById('returnNotes')?.value || '';
            const asset = Store.getAsset(assetId);
            if (!asset) return;
            const holder = asset.holderId;
            asset.status = 'Available';
            asset.holderId = null;
            asset.expectedReturnDate = null;
            asset.history.push({ date: new Date().toISOString(), from: 'Allocated', to: 'Available', note: notes ||
                    'Returned' });
            Store.addLog(Store.currentUser.id, `Returned ${asset.name} (${asset.assetTag})`);
            if (holder) Store.addNotification(holder, `Asset ${asset.name} has been returned.`, 'info');
            closeModal();
            showToast(`${asset.name} returned`, 'success');
            render();
        };

        window.transferAsset = function(assetId) {
            const newHolderId = document.getElementById('transferUser')?.value;
            if (!newHolderId) { showToast('Select a new holder', 'error'); return; }
            const asset = Store.getAsset(assetId);
            if (!asset) return;
            const oldHolder = asset.holderId;
            asset.holderId = newHolderId;
            asset.departmentId = Store.getUser(newHolderId)?.departmentId || null;
            asset.history.push({ date: new Date().toISOString(), from: 'Allocated', to: 'Allocated',
                note: `Transferred to ${Store.getUser(newHolderId)?.name}` });
            Store.addLog(Store.currentUser.id, `Transferred ${asset.name} to ${Store.getUser(newHolderId)?.name}`);
            if (oldHolder) Store.addNotification(oldHolder, `Asset ${asset.name} transferred to ${Store.getUser(newHolderId)?.name}`,
                'warning');
            Store.addNotification(newHolderId, `Asset ${asset.name} transferred to you.`, 'info');
            closeModal();
            showToast(`Transferred ${asset.name}`, 'success');
            render();
        };

        window.bookResource = function() {
            const assetId = document.getElementById('bookResource')?.value;
            const start = document.getElementById('bookStart')?.value;
            const end = document.getElementById('bookEnd')?.value;
            if (!assetId || !start || !end) { showToast('All fields required', 'error'); return; }
            if (new Date(start) >= new Date(end)) { showToast('End time must be after start', 'error'); return; }

            // Check overlap
            const overlap = Store.bookings.some(b => {
                if (b.assetId !== assetId) return false;
                if (b.status === 'Cancelled' || b.status === 'Completed') return false;
                const bStart = new Date(b.start);
                const bEnd = new Date(b.end);
                const reqStart = new Date(start);
                const reqEnd = new Date(end);
                return (reqStart < bEnd && reqEnd > bStart);
            });
            if (overlap) { showToast('Time slot overlaps with existing booking', 'error'); return; }

            const booking = {
                id: Store.nextId('b'),
                assetId,
                bookedBy: Store.currentUser.id,
                start,
                end,
                status: 'Upcoming',
                createdAt: new Date().toISOString()
            };
            Store.bookings.push(booking);
            Store.addLog(Store.currentUser.id, `Booked ${Store.getAsset(assetId)?.name} for ${new Date(start).toLocaleString()}`);
            Store.addNotification(Store.currentUser.id,
                `Booking confirmed for ${Store.getAsset(assetId)?.name} at ${new Date(start).toLocaleString()}`, 'success');
            closeModal();
            showToast('Booking confirmed', 'success');
            render();
        };

        window.cancelBooking = function(bookingId) {
            const booking = Store.getBooking(bookingId);
            if (!booking) return;
            booking.status = 'Cancelled';
            Store.addLog(Store.currentUser.id, `Cancelled booking for ${Store.getAsset(booking.assetId)?.name}`);
            Store.addNotification(booking.bookedBy, `Booking for ${Store.getAsset(booking.assetId)?.name} cancelled.`,
            'warning');
            showToast('Booking cancelled', 'warning');
            render();
        };

        window.raiseMaintenance = function() {
            const assetId = document.getElementById('maintAsset')?.value;
            const issue = document.getElementById('maintIssue')?.value.trim();
            const priority = document.getElementById('maintPriority')?.value || 'Medium';
            if (!assetId || !issue) { showToast('Asset and issue required', 'error'); return; }
            const maint = {
                id: Store.nextId('m'),
                assetId,
                requesterId: Store.currentUser.id,
                issue,
                priority,
                status: 'Pending',
                photo: null,
                assignedTo: null,
                createdAt: new Date().toISOString(),
                resolvedAt: null
            };
            Store.maintenance.push(maint);
            // Asset status not changed until approved
            Store.addLog(Store.currentUser.id, `Raised maintenance for ${Store.getAsset(assetId)?.name}`);
            Store.addNotification(Store.currentUser.id,
                `Maintenance request submitted for ${Store.getAsset(assetId)?.name}`, 'info');
            // Notify asset managers
            Store.users.filter(u => u.role === 'asset_manager' || u.role === 'admin').forEach(u => {
                Store.addNotification(u.id, `Maintenance request for ${Store.getAsset(assetId)?.name} pending approval.`,
                    'warning');
            });
            closeModal();
            showToast('Maintenance request submitted', 'success');
            render();
        };

        window.approveMaintenance = function(maintId) {
            const maint = Store.getMaintenance(maintId);
            if (!maint) return;
            maint.status = 'Approved';
            const asset = Store.getAsset(maint.assetId);
            if (asset) {
                Store.transitionAsset(asset.id, 'Under Maintenance', 'Maintenance approved');
            }
            Store.addLog(Store.currentUser.id, `Approved maintenance for ${asset?.name}`);
            Store.addNotification(maint.requesterId, `Maintenance request for ${asset?.name} approved.`, 'success');
            showToast('Maintenance approved', 'success');
            render();
        };

        window.rejectMaintenance = function(maintId) {
            const maint = Store.getMaintenance(maintId);
            if (!maint) return;
            maint.status = 'Rejected';
            Store.addLog(Store.currentUser.id, `Rejected maintenance for ${Store.getAsset(maint.assetId)?.name}`);
            Store.addNotification(maint.requesterId, `Maintenance request for ${Store.getAsset(maint.assetId)?.name} rejected.`,
                'error');
            showToast('Maintenance rejected', 'error');
            render();
        };

        window.resolveMaintenance = function(maintId) {
            const maint = Store.getMaintenance(maintId);
            if (!maint) return;
            maint.status = 'Resolved';
            maint.resolvedAt = new Date().toISOString();
            const asset = Store.getAsset(maint.assetId);
            if (asset) {
                Store.transitionAsset(asset.id, 'Available', 'Maintenance resolved');
            }
            Store.addLog(Store.currentUser.id, `Resolved maintenance for ${asset?.name}`);
            Store.addNotification(maint.requesterId, `Maintenance for ${asset?.name} resolved.`, 'success');
            showToast('Maintenance resolved', 'success');
            render();
        };

        // ----- ORG SETUP ACTIONS -----
        window.addDepartment = function() {
            const name = document.getElementById('deptName')?.value.trim();
            const parentId = document.getElementById('deptParent')?.value || null;
            if (!name) { showToast('Department name required', 'error'); return; }
            Store.departments.push({ id: Store.nextId('d'), name, parentId, headId: null, status: 'Active' });
            Store.addLog(Store.currentUser.id, `Added department ${name}`);
            closeModal();
            showToast(`Department ${name} created`, 'success');
            render();
        };

        window.addCategory = function() {
            const name = document.getElementById('catName')?.value.trim();
            const fields = document.getElementById('catFields')?.value.split(',').map(s => s.trim()).filter(Boolean) || [];
            if (!name) { showToast('Category name required', 'error'); return; }
            Store.categories.push({ id: Store.nextId('c'), name, customFields: fields });
            Store.addLog(Store.currentUser.id, `Added category ${name}`);
            closeModal();
            showToast(`Category ${name} created`, 'success');
            render();
        };

        window.addEmployee = function() {
            const name = document.getElementById('empName')?.value.trim();
            const email = document.getElementById('empEmail')?.value.trim();
            const deptId = document.getElementById('empDept')?.value;
            const password = document.getElementById('empPass')?.value.trim() || 'temp123';
            if (!name || !email) { showToast('Name and email required', 'error'); return; }
            if (Store.users.find(u => u.email === email)) { showToast('Email already exists', 'error'); return; }
            Store.users.push({
                id: Store.nextId('u'),
                name,
                email,
                password,
                role: 'employee',
                departmentId: deptId,
                status: 'Active'
            });
            Store.addLog(Store.currentUser.id, `Added employee ${name}`);
            closeModal();
            showToast(`Employee ${name} created`, 'success');
            render();
        };

        window.promoteEmployee = function(userId) {
            const user = Store.getUser(userId);
            if (!user) return;
            const roles = ['employee', 'dept_head', 'asset_manager'];
            const currentIdx = roles.indexOf(user.role);
            const nextRole = roles[(currentIdx + 1) % roles.length];
            user.role = nextRole;
            Store.addLog(Store.currentUser.id, `Promoted ${user.name} to ${Store.getRoleLabel(nextRole)}`);
            Store.addNotification(userId, `You have been promoted to ${Store.getRoleLabel(nextRole)}.`, 'success');
            showToast(`${user.name} promoted to ${Store.getRoleLabel(nextRole)}`, 'success');
            render();
        };

        window.createAudit = function() {
            const name = document.getElementById('auditName')?.value.trim();
            const scope = document.getElementById('auditScope')?.value || null;
            const start = document.getElementById('auditStart')?.value;
            const end = document.getElementById('auditEnd')?.value;
            const auditors = Array.from(document.getElementById('auditAuditors')?.selectedOptions || []).map(o => o.value);
            if (!name) { showToast('Audit name required', 'error'); return; }
            Store.audits.push({
                id: Store.nextId('aud'),
                name,
                scope,
                dateRange: [start, end],
                auditors,
                status: 'In Progress',
                items: []
            });
            Store.addLog(Store.currentUser.id, `Created audit ${name}`);
            closeModal();
            showToast(`Audit ${name} created`, 'success');
            render();
        };

        window.closeAudit = function(auditId) {
            const audit = Store.audits.find(a => a.id === auditId);
            if (!audit) return;
            audit.status = 'Closed';
            Store.addLog(Store.currentUser.id, `Closed audit ${audit.name}`);
            showToast(`Audit ${audit.name} closed`, 'success');
            render();
        };

        window.markAllRead = function() {
            const user = Store.currentUser;
            Store.notifications.forEach(n => { if (n.userId === user.id) n.read = true; });
            render();
        };

        // ----- NAVIGATION -----
        function attachAppEvents() {
            // Nav items
            document.querySelectorAll('.nav-item').forEach(el => {
                el.addEventListener('click', () => {
                    currentPage = el.dataset.page;
                    modalContent = null;
                    render();
                });
            });

            // Tabs in org
            document.querySelectorAll('.tab').forEach(el => {
                el.addEventListener('click', () => {
                    selectedTab = el.dataset.tab;
                    render();
                });
            });

            // Logout
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    Store.currentUser = null;
                    modalContent = null;
                    render();
                    showToast('Logged out', 'info');
                });
            }

            // Notification bell
            const bell = document.getElementById('notificationBell');
            if (bell) {
                bell.addEventListener('click', () => {
                    // Toggle notifications view - just mark as read on click for simplicity
                    const user = Store.currentUser;
                    Store.notifications.forEach(n => { if (n.userId === user.id) n.read = true; });
                    render();
                    showToast('Notifications marked as read', 'info');
                });
            }
        }

        // ----- FILTER ASSETS -----
        window.filterAssets = function() {
            // Simple re-render with filter - we'll just re-render the whole page
            render();
        };

        // ----- MISC VIEWS -----
        window.viewAsset = function(assetId) {
            const asset = Store.getAsset(assetId);
            if (!asset) return;
            const history = asset.history || [];
            showToast(`Asset: ${asset.name} | Status: ${asset.status} | History: ${history.length} events`, 'info');
        };

        window.viewAudit = function(auditId) {
            const audit = Store.audits.find(a => a.id === auditId);
            if (!audit) return;
            showToast(`Audit: ${audit.name} | Status: ${audit.status} | Auditors: ${audit.auditors?.length || 0}`, 'info');
        };

        window.editDepartment = function(id) {
            showToast('Edit department functionality - inline editing coming soon', 'info');
        };
        window.editCategory = function(id) {
            showToast('Edit category functionality - inline editing coming soon', 'info');
        };
        window.editEmployee = function(id) {
            showToast('Edit employee functionality - inline editing coming soon', 'info');
        };

        // ------------------------------------------------
        //  INIT
        // ------------------------------------------------
        render();
    </script>
</body>
</html>
